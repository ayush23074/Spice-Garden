services:
  - type: web
    name: jango-app
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py migrate && python manage.py collectstatic --noinput && gunicorn Jango.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: .onrender.com,127.0.0.1,localhost
      - key: DB_PROFILE
        value: prod
      - key: PROD_DB_ENGINE
        value: mysql
      - key: PROD_DB_NAME
        sync: false
      - key: PROD_DB_USER
        sync: false
      - key: PROD_DB_PASSWORD
        sync: false
      - key: PROD_DB_HOST
        sync: false
      - key: PROD_DB_PORT
        sync: false
      - key: PROD_DB_SSL_CA
        sync: false
      - key: PROD_DB_CONN_MAX_AGE
        value: "60"
