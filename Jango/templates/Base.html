<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page }}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #eef2f3, #d9e4f5);
        }

        /* Navbar Glass Effect */
        .custom-navbar {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 12px;
            margin: 10px;
            padding: 10px 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        /* Brand Styling */
        .navbar-brand {
            font-weight: bold;
            font-size: 22px;
            background: linear-gradient(45deg, #ff6a00, #ee0979);

            background-clip: text;           /* standard */
            -webkit-background-clip: text;   /* for Chrome/Safari */

            color: transparent;
            -webkit-text-fill-color: transparent;
        }

        /* Nav links */
        .nav-link {
            position: relative;
            font-weight: 500;
            margin: 0 8px;
            transition: 0.3s;
        }

        .nav-link:hover {
            color: #ee0979 !important;
        }

        /* Underline animation */
        .nav-link::after {
            content: "";
            position: absolute;
            width: 0%;
            height: 2px;
            bottom: 0;
            left: 0;
            background: #ee0979;
            transition: 0.3s;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        /* Search box */
        .form-control {
            border-radius: 20px;
            border: none;
            padding: 6px 15px;
        }

        .btn-search {
            border-radius: 20px;
            background: linear-gradient(45deg, #ff6a00, #ee0979);
            color: white;
            border: none;
        }

        .btn-search:hover {
            opacity: 0.85;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg custom-navbar sticky-top">
  <div class="container-fluid">

    <a class="navbar-brand" href="{% url 'Home' %}">🍽 Receipe App</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarSupportedContent">

      <ul class="navbar-nav me-auto mb-2 mb-lg-0">

        {% if request.user.is_authenticated %}
        <li class="nav-item">
          <a class="nav-link" href="{% url 'Menu' %}">Menu</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'Receipe' %}">Add Receipe</a>
        </li>

        <li class="nav-item">
        <a class="nav-link" href="{% url 'View_Receipe' %}">View Receipe</a>
        </li>

        <li>  
          <a class="nav-link" href="{% url 'Employee' %}">Employee Ratings</a>
        </li>

        <li class="nav-item">
          <a class="nav-link text-danger" href="{% url 'Logout' %}">Logout</a>
        </li>
        
        {% else %}
        <li class="nav-item">
          <a class="nav-link" href="{% url 'Login' %}">Login</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'Register' %}">Register</a>
        </li>
        {% endif %}

      </ul>

      <!-- Search -->
      {% if request.user.is_authenticated %}
        <form class="d-flex">
            <input class="form-control me-2" name="Search" type="search" placeholder="Search recipes...">
            <button class="btn btn-search" type="submit">Search</button>
        </form>
      {% endif %}

    </div>

  </div>
</nav>

{% block start %}
{% endblock %}

</body>
</html>
